<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Quiz Hewan Seru - EasyStep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .option { 
            transition: all 0.4s cubic-bezier(0.4, 0.8, 0.2, 1); 
        }
        .option:hover { 
            transform: scale(1.12) translateY(-8px); 
            box-shadow: 0 30px 40px -15px rgb(16 185 129 / 0.3);
        }
        .correct { 
            animation: correctPop 0.6s ease; 
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
        }
        .wrong { 
            animation: shake 0.4s ease; 
        }
        @keyframes correctPop {
            0% { transform: scale(0.6); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            75% { transform: translateX(12px); }
        }
        .animal-circle {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: white;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-yellow-100 via-emerald-100 to-sky-100 min-h-screen">

    <div class="max-w-2xl mx-auto p-6">
        <!-- Fun Header -->
        <div class="text-center mb-10">
            <div class="flex justify-center gap-4 mb-6">
                <span class="text-6xl animate-bounce">🐘</span>
                <span class="text-6xl animate-bounce delay-150">🦒</span>
                <span class="text-6xl animate-bounce delay-300">🐰</span>
                <span class="text-6xl animate-bounce delay-500">🦁</span>
            </div>
            <h1 class="text-6xl font-bold text-emerald-700 tracking-tighter drop-shadow-md">
                🐾 QUIZ HEWAN SERU!
            </h1>
            <p class="text-emerald-600 text-2xl mt-3 font-medium">Siap jadi ahli hewan?</p>
        </div>

        <!-- Progress -->
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="text-sm font-medium text-emerald-700">
                Pertanyaan <span id="current-q" class="font-bold">1</span>/5
            </div>
            <div class="h-2.5 w-40 bg-gray-200 rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-gradient-to-r from-emerald-400 to-teal-500 w-1/5 transition-all"></div>
            </div>
        </div>

        <!-- Question -->
        <div class="bg-white rounded-3xl shadow-2xl p-10 mb-8 text-center">
            <p id="question" class="text-3xl font-semibold text-gray-800 leading-relaxed min-h-[100px]"></p>
        </div>

        <!-- Options -->
        <div class="space-y-5" id="options"></div>

        <!-- Result -->
        <div id="result" class="hidden mt-10 text-center"></div>
        
        <!-- Next Button -->
        <div class="text-center mt-10">
            <button onclick="nextQuestion()" id="next-btn"
                    class="hidden bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white px-12 py-5 rounded-3xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
                Lanjut Pertanyaan Berikutnya →
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Hewan apa yang suka makan wortel?",
                emoji: "🥕",
                options: ["🦁 Singa", "🐰 Kelinci", "🐯 Harimau", "🐊 Buaya"],
                answer: 1
            },
            {
                q: "Hewan apa yang punya leher paling panjang?",
                emoji: "🦒",
                options: ["🐘 Gajah", "🦒 Jerapah", "🐎 Kuda", "🦓 Zebra"],
                answer: 1
            },
            {
                q: "Suara bebek itu seperti apa?",
                emoji: "🦆",
                options: ["🐱 Miau", "🐶 Guk-guk", "🦆 Kwek-kwek", "🐑 Mbek"],
                answer: 2
            },
            {
                q: "Hewan apa yang bisa terbang?",
                emoji: "🦅",
                options: ["🐟 Ikan", "🐦 Burung", "🐍 Ular", "🐱 Kucing"],
                answer: 1
            },
            {
                q: "Hewan darat terbesar di dunia adalah?",
                emoji: "🐘",
                options: ["🐘 Gajah", "🦏 Badak", "🦁 Singa", "🐻 Beruang"],
                answer: 0
            }
        ];

        let current = 0;
        let score = 0;

        function loadQuestion() {
            const q = questions[current];
            document.getElementById('question').innerHTML = `${q.emoji} ${q.q}`;
            document.getElementById('current-q').textContent = current + 1;
            document.getElementById('progress').style.width = `${((current + 1) / questions.length) * 100}%`;

            let html = '';
            q.options.forEach((opt, i) => {
                html += `
                    <button onclick="checkAnswer(${i})" 
                            class="option w-full text-left p-6 bg-white hover:bg-emerald-50 border-2 border-emerald-200 rounded-3xl text-2xl font-medium flex items-center gap-6">
                        <span class="text-5xl">${opt.split(' ')[0]}</span>
                        <span>${opt.split(' ').slice(1).join(' ')}</span>
                    </button>`;
            });
            document.getElementById('options').innerHTML = html;
            document.getElementById('result').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function checkAnswer(selected) {
            const q = questions[current];
            const resultDiv = document.getElementById('result');

            if (selected === q.answer) {
                score++;
                resultDiv.innerHTML = `
                    <div class="text-7xl mb-4">🎉</div>
                    <span class="text-green-600 text-5xl font-bold">Benar Sekali!</span>
                    <p class="text-2xl text-emerald-600 mt-3">Kamu hebat banget! 🥳</p>`;
            } else {
                resultDiv.innerHTML = `
                    <div class="text-6xl mb-4">😔</div>
                    <span class="text-red-500 text-4xl">Salah</span>
                    <p class="text-xl mt-4">Jawaban yang benar: <strong class="text-emerald-600">${q.options[q.answer]}</strong></p>`;
            }

            resultDiv.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            current++;
            if (current < questions.length) {
                loadQuestion();
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = percentage >= 80 ? "Kamu Juara Hewan! 🏆" : 
                         percentage >= 60 ? "Sangat Bagus! 👍" : "Keren! Terus Belajar ya 💪";

            document.getElementById('options').innerHTML = `
                <div class="text-center py-20 bg-white rounded-3xl shadow-2xl">
                    <div class="text-8xl mb-6">🎊</div>
                    <h2 class="text-6xl font-bold text-emerald-600 mb-2">${score}/${questions.length}</h2>
                    <p class="text-3xl text-gray-700">${percentage}% Benar</p>
                    <p class="text-2xl mt-6 text-emerald-700">${message}</p>
                    <button onclick="restartQuiz()" 
                            class="mt-12 bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-12 py-5 rounded-3xl text-xl font-bold shadow-xl">
                        Main Lagi 🎮
                    </button>
                </div>`;
        }

        function restartQuiz() {
            current = 0;
            score = 0;
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
