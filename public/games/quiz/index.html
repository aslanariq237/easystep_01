<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Quiz Hewan Seru - EasyStep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .option { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .option:hover { 
            transform: scale(1.08) translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .correct { animation: correctAnim 0.6s; }
        .wrong { animation: wrongAnim 0.4s; }
        @keyframes correctAnim {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes wrongAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-100 via-teal-50 to-sky-100 min-h-screen">

    <div class="max-w-2xl mx-auto p-6">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-white rounded-3xl px-6 py-3 shadow-md mb-4">
                <span class="text-4xl">🐘</span>
                <span class="text-4xl">🦒</span>
                <span class="text-4xl">🐰</span>
            </div>
            <h1 class="text-5xl font-bold text-emerald-700 mb-2 tracking-tight">
                🐾 Quiz Hewan Seru!
            </h1>
            <p class="text-emerald-600 text-lg">Tebak jawabannya yuk!</p>
        </div>

        <!-- Question -->
        <div class="bg-white rounded-3xl shadow-lg p-8 mb-8">
            <div class="text-center">
                <p id="question" class="text-2xl font-medium text-gray-800 leading-relaxed min-h-[80px]"></p>
            </div>
        </div>

        <!-- Options -->
        <div class="space-y-4" id="options"></div>

        <!-- Result -->
        <div id="result" class="hidden mt-8 text-center text-3xl font-bold"></div>
        
        <!-- Next Button -->
        <div class="text-center mt-8">
            <button onclick="nextQuestion()" id="next-btn"
                    class="hidden bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-10 py-4 rounded-3xl font-semibold text-lg shadow-lg hover:shadow-xl transition">
                Lanjut ke Pertanyaan Berikutnya →
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Hewan apa yang suka makan wortel?",
                emoji: "🥕",
                options: ["🦁 Singa", "🐰 Kelinci", "🐯 Harimau", "🐊 Buaya"],
                answer: 1
            },
            {
                q: "Hewan apa yang memiliki leher paling panjang?",
                emoji: "🦒",
                options: ["🐘 Gajah", "🦒 Jerapah", "🐎 Kuda", "🦓 Zebra"],
                answer: 1
            },
            {
                q: "Suara apa yang dihasilkan bebek?",
                emoji: "🦆",
                options: ["🐱 Miau", "🐶 Guk-guk", "🦆 Kwek-kwek", "🐑 Mbek-mbek"],
                answer: 2
            },
            {
                q: "Hewan apa yang bisa terbang tinggi?",
                emoji: "🦅",
                options: ["🐟 Ikan", "🐦 Burung", "🐍 Ular", "🐱 Kucing"],
                answer: 1
            },
            {
                q: "Hewan darat paling besar di dunia adalah?",
                emoji: "🐘",
                options: ["🐘 Gajah", "🦏 Badak", "🦁 Singa", "🐻 Beruang"],
                answer: 0
            }
        ];

        let current = 0;
        let score = 0;
        
        //sudah di tambahkan untuk gambar dan ini hanya untuk perulangan
        function loadQuestion() {
            const q = questions[current];
            document.getElementById('question').innerHTML = `${q.emoji} ${q.q}`;

            let html = '';
            q.options.forEach((opt, i) => {
                html += `
                    <button onclick="checkAnswer(${i})" 
                            class="option w-full text-left p-6 bg-white hover:bg-emerald-50 border-2 border-emerald-200 rounded-3xl text-xl font-medium flex items-center gap-4">
                        <span class="text-3xl">${opt.split(' ')[0]}</span>
                        <span>${opt.split(' ').slice(1).join(' ')}</span>
                    </button>`;
            });
            document.getElementById('options').innerHTML = html;
            document.getElementById('result').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function checkAnswer(selected) {
            const q = questions[current];
            const resultDiv = document.getElementById('result');

            if (selected === q.answer) {
                score++;
                resultDiv.innerHTML = `
                    <span class="text-green-600 text-4xl">🎉 Benar Sekali!</span>
                    <p class="text-xl mt-3">Kamu hebat! 🥳</p>`;
                resultDiv.classList.add('correct');
            } else {
                resultDiv.innerHTML = `
                    <span class="text-red-600 text-4xl">😔 Salah</span>
                    <p class="text-xl mt-3">Jawaban yang benar: <strong>${q.options[q.answer]}</strong></p>`;
                resultDiv.classList.add('wrong');
            }

            resultDiv.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            current++;
            if (current < questions.length) {
                loadQuestion();
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = '';

            if (percentage >= 80) message = "Kamu luar biasa! 🏆";
            else if (percentage >= 60) message = "Bagus sekali! 👍";
            else message = "Terus belajar ya! 💪";

            document.getElementById('options').innerHTML = `
                <div class="text-center py-16 bg-white rounded-3xl shadow-xl">
                    <div class="text-7xl mb-6">🏆</div>
                    <h2 class="text-5xl font-bold text-emerald-600 mb-4">${score}/${questions.length}</h2>
                    <p class="text-2xl text-gray-700 mb-6">${percentage}% Benar</p>
                    <p class="text-xl text-gray-600">${message}</p>
                    <button onclick="restartQuiz()" 
                            class="mt-10 bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-4 rounded-3xl text-lg font-medium">
                        Main Lagi 🎮
                    </button>
                </div>`;
        }

        function restartQuiz() {
            current = 0;
            score = 0;
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
